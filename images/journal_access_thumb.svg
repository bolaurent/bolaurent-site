<svg viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <!-- palette: warm cream paper, woodcut vermillion -->
  <rect width="600" height="600" fill="#efe6d3"/>

  <!-- stamped pamphlet frame -->
  <rect x="28" y="28" width="544" height="544" fill="none" stroke="#c1352a" stroke-width="7"/>
  <rect x="42" y="42" width="516" height="516" fill="none" stroke="#c1352a" stroke-width="2"/>

  <!-- impact / rebellion burst behind the lock -->
  <g fill="#c1352a" opacity="0.9">
    <polygon points="300,300 330,150 348,150"/>
    <polygon points="300,300 372,176 388,186"/>
    <polygon points="300,300 236,168 252,160"/>
    <polygon points="300,300 188,206 198,220"/>
    <polygon points="300,300 430,232 438,248"/>
    <polygon points="300,300 165,290 165,306"/>
  </g>

  <!-- freed pages flying up and to the right -->
  <g>
    <g transform="translate(372,150) rotate(14)">
      <rect x="-26" y="-32" width="52" height="64" rx="3" fill="#c1352a"/>
      <rect x="-16" y="-18" width="32" height="4" fill="#efe6d3"/>
      <rect x="-16" y="-6" width="32" height="4" fill="#efe6d3"/>
      <rect x="-16" y="6" width="22" height="4" fill="#efe6d3"/>
    </g>
    <g transform="translate(432,98) rotate(-9)">
      <rect x="-22" y="-27" width="44" height="54" rx="3" fill="#c1352a"/>
      <rect x="-13" y="-15" width="26" height="3.5" fill="#efe6d3"/>
      <rect x="-13" y="-5" width="26" height="3.5" fill="#efe6d3"/>
      <rect x="-13" y="5" width="18" height="3.5" fill="#efe6d3"/>
    </g>
    <g transform="translate(478,58) rotate(20)">
      <rect x="-17" y="-21" width="34" height="42" rx="2.5" fill="#c1352a"/>
      <rect x="-10" y="-11" width="20" height="3" fill="#efe6d3"/>
      <rect x="-10" y="-3" width="20" height="3" fill="#efe6d3"/>
    </g>
  </g>

  <!-- padlock, slightly tilted for energy -->
  <g transform="rotate(-6 300 360)">
    <!-- body -->
    <rect x="222" y="318" width="156" height="150" rx="22" fill="#c1352a"/>
    <!-- empty right socket where the shackle sprang out -->
    <circle cx="352" cy="322" r="9" fill="#efe6d3"/>
    <!-- keyhole -->
    <circle cx="300" cy="378" r="16" fill="#efe6d3"/>
    <polygon points="291,390 309,390 304,420 296,420" fill="#efe6d3"/>
  </g>

  <!-- open shackle: sprung up and out of the right hole -->
  <g transform="rotate(-40 250 322)">
    <path d="M250 322 L250 266 Q250 230 300 230 Q350 230 350 266 L350 322"
          fill="none" stroke="#c1352a" stroke-width="23" stroke-linecap="round"/>
  </g>
</svg>
