format:
  html:
    theme: litera
    css: styles.css
    include-after-body:
      text: |
        <script>
        window.addEventListener('DOMContentLoaded', () => {
          const langByIndex = ['en', 'ja'];
          const tabs = document.querySelectorAll('.panel-tabset .nav-link');

          // Open the tab named in ?lang= on load
          const want = new URLSearchParams(location.search).get('lang');
          const wantIdx = langByIndex.indexOf(want);
          if (wantIdx >= 0 && tabs[wantIdx]) {
            new bootstrap.Tab(tabs[wantIdx]).show();
          }

          // Reflect the active tab back into the URL when clicked
          tabs.forEach((tab, i) => {
            tab.addEventListener('shown.bs.tab', () => {
              const lang = langByIndex[i];
              if (!lang) return;
              const url = new URL(location);
              url.searchParams.set('lang', lang);
              history.replaceState(null, '', url);
            });
          });
        });
        </script>